{% extends "base.html" %}

{% block content %}
    <h1>Add Store</h1>
    <form action="" method="post">
        {{ form.hidden_tag() }}
        <p>
            {{ form.location.label }} <br>
            {{ form.location(size=64) }}
            {% for error in form.location.errors %}
            <span>[{{error}}]</span>
            {% endfor %}
        </p>
        <p>{{ form.submit() }}</p>
    </form>
{% endblock %}
