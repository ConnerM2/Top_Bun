{% extends "base.html" %}

{% block content %}
    {% for store in stores %}
        {% if store.is_active %}
            <a href="/stores/{{ store.id }}">
                <button> {{store.location}} </button>
            </a>
        {% endif %}
    {% endfor %}

    <button><a href="{{url_for('add_store')}}">Add New Store</a></button>
{% endblock %}
