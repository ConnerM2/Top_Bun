{% extends "base.html" %}

{% block content %}
    <h1> {{store.location}} </h1>
    {% for response in store.responses %}
    <div class="container">
        <div class="row">
            <div class="col">
                <ul class="list-group">
                    <li class="list-group-item"><a href="/stores/{{store.id}}/res{{response.id}}" style="text-decoration: none;">response_{{loop.index}} - {{response.timestamp.strftime("%b %d, %Y %I:%M %p")}} </a></li>
                </ul>  
            </div>
            {% endfor %}
        </div>
        <div class="row">
            
        <div class="mt-3">
            <a href="{{url_for('assessment_page', store_id=store.id, assessment_id=assessment.id)}}" class="btn btn-primary">New assessment</a>
        </div>
        

        
        <div class="mt-3">
            <form action="" method="post">
                {{ form.hidden_tag() }}
                <button type="submit" class="btn btn-danger">Archive Store</button> 
            </form>   
        </div>
        </div>                         
        
    </div>
    
    


{% endblock %}
